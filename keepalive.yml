name: Supabase wach halten

# Supabase pausiert Projekte im Free-Tarif nach ~7 Tagen ohne Zugriff.
# Dieser Job stellt alle 3 Tage eine triviale Anfrage und verhindert das.

on:
  schedule:
    - cron: '17 6 */3 * *'   # alle 3 Tage, 06:17 UTC
  workflow_dispatch:          # + manuell ausloesbar im Actions-Tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Datenbank anpingen
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "::error::SUPABASE_URL oder SUPABASE_KEY fehlt in den Repository Secrets."
            exit 1
          fi

          # nur ein einziger datensatz - reicht, um das projekt als aktiv zu markieren
          code=$(curl -s -o /tmp/out.txt -w '%{http_code}' \
            "$URL/rest/v1/lists?select=id&limit=1" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY")

          echo "HTTP $code"

          # 200 = wach und erreichbar
          # 401 = wach, aber RLS blockt anonyme zugriffe -> genau das wollen wir, projekt lebt
          if [ "$code" = "200" ] || [ "$code" = "401" ]; then
            echo "Projekt ist wach."
            exit 0
          fi

          echo "::error::Projekt antwortet nicht wie erwartet (HTTP $code)"
          cat /tmp/out.txt
          exit 1
